name: staging

on:
  workflow_run:
    workflows:
      - "quality"
    branches:
      - main
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:staging
            ${{ steps.image.outputs.image }}:staging-${{ github.event.workflow_run.head_sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL_STAGING }}
            NEXT_PUBLIC_NOINDEX=1

      - name: Trigger Dokploy update
        run: |
          curl -X POST "${{ secrets.DOKPLOY_STAGING_URL }}/api/application.update" \
            -H "x-api-key: ${{ secrets.DOKPLOY_STAGING_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_STAGING_APPLICATION_ID }}","dockerImage":"${{ steps.image.outputs.image }}:staging"}'

      - name: Trigger Dokploy deploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_STAGING_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_STAGING_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_STAGING_APPLICATION_ID }}"}'
