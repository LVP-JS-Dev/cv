name: quality

on:
  push:
  pull_request:

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: npm ci
      - name: Run Lighthouse CI (mobile + desktop)
        run: npm run lhci
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
